Title: '&0NOTICE 示例 - 奖励计划'
Render-Type: DIALOG

Options:
  Arguments: true
  Default-Layout: 0
  Min-Click-Delay: 200

Events:
  Open:
    - 'sound: BLOCK_NOTE_BLOCK_PLING-1-2'
  Close:
    - 'sound: BLOCK_CHEST_CLOSE-1-0'

Dialog:
  Min-Version: '1.21.6'
  Fallback-Menu: 'Example'
  Allow-Esc-Close: true
  External-Title: '&8Dialogs / Notice'

  Pages:
    - Id: 'notice_signup'
      Type: 'notice'
      Title: '&0NOTICE 示例 - 奖励计划'
      Body:
        - Id: 'desc'
          Renderer: 'plain_message'
          Width: 320
          Text:
            - '&7这是一个 &eNOTICE&7 类型示例。'
            - '&7它展示了输入框和 &bmulti_option&7 配置。'
        - Id: 'signup_note'
          Renderer: 'input'
          Width: 320
          Label: '&7附加备注'
          Placeholder: '&8例如：周末活动玩家'
          Max-Length: 32
        - Id: 'reward_packs'
          Renderer: 'multi_option'
          Width: 320
          Label: '&7选择你要领取的奖励包'
          Default-Value:
            - 'starter'
          Options:
            - Id: 'starter'
              Title: '&a新手包'
              Description: '&7基础补给与起步物资'
            - Id: 'combat'
              Title: '&c战斗包'
              Description: '&7适合竞技与刷怪玩法'
            - Id: 'builder'
              Title: '&b建筑包'
              Description: '&7适合家园建设与装饰'
        - Id: 'confirm_rules'
          Renderer: 'boolean'
          Width: 320
          Label: '&7我已阅读奖励发放规则'
          Initial: true
      Actions:
        - Id: 'submit_notice'
          Label: '&a提交选择'
          Width: 180
          Close-On-Click: true
          Execute:
            - 'set-meta: notice_note %trmenu_dialog_input_signup_note%'
            - 'set-meta: notice_packs %trmenu_dialog_option_reward_packs%'
            - 'tell: &aNOTICE 示例已提交, 奖励包: %trmenu_dialog_option_reward_packs%'
